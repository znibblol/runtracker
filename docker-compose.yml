version: '3.8'

services:
  runtracker:
    build: .
    container_name: runtracker
    ports:
      - "3001:3001"
    volumes:
      # Persistent storage för uploads och databas
      - ./uploads:/app/uploads
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/runs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
